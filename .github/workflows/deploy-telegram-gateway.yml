name: Deploy Telegram Gateway

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        type: choice
        options:
          - telegram-staging
          - telegram-production
      action:
        description: 'Action'
        required: true
        type: choice
        options:
          - deploy
          - rollback

env:
  SERVICE_NAME: telegram-gateway
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  ENVIRONMENT: ${{ inputs.environment }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.SERVICE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=ref,event=tag
            type=raw,value=${{ inputs.environment }},enable=${{ inputs.environment }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./services/telegram-gateway
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to ${{ inputs.environment }}
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ vars.TG_VPS_HOST }}
          username: ${{ vars.TG_VPS_USER }}
          key: ${{ secrets.TG_VPS_SSH_KEY }}
          envs: IMAGE_TAG,ENVIRONMENT
          script: |
            set -e
            export IMAGE_TAG="${{ steps.meta.outputs.tags }}"
            export ENVIRONMENT="${{ inputs.environment }}"

            # Pull new image
            docker pull "$IMAGE_TAG"

            # Update compose file
            cd /opt/telegram-gateway
            IMAGE="$IMAGE_TAG" docker compose -f docker-compose.telegram-gateway.yml up -d telegram-gateway

            # Health check
            sleep 10
            curl -f http://localhost:8080/health || exit 1

            echo "Deploy complete"

  rollback:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Rollback to previous version
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ vars.TG_VPS_HOST }}
          username: ${{ vars.TG_VPS_USER }}
          key: ${{ secrets.TG_VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/telegram-gateway
            docker compose -f docker-compose.telegram-gateway.yml pull
            docker compose -f docker-compose.telegram-gateway.yml up -d telegram-gateway
            echo "Rollback complete"
