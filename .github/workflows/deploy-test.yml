name: Deploy → Test

on:
  push:
    branches: [develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: test

    steps:
      - uses: actions/checkout@v4

      - name: Sync code to VPS
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.git' --exclude='.env*'
          path: ./
          remote_path: /opt/pm-agent/test/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Write .env and restart containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/pm-agent/test

            cat > .env.test << EOF
            DB_USER=pm_agent_test
            DB_NAME=pm_agent_test
            DB_PASSWORD=${{ secrets.TEST_DB_PASSWORD }}
            YC_API_KEY=${{ secrets.YC_API_KEY }}
            YC_FOLDER_ID=${{ secrets.YC_FOLDER_ID }}
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            TRACKER_TOKEN=${{ secrets.TRACKER_TOKEN }}
            TRACKER_ORG_ID=${{ secrets.TRACKER_ORG_ID }}
            TRACKER_ORG_TYPE=${{ secrets.TRACKER_ORG_TYPE }}
            TRACKER_QUEUE=${{ secrets.TRACKER_QUEUE }}
            TRACKER_MCP_URL=${{ secrets.TRACKER_MCP_URL }}
            TRACKER_MCP_TOKEN=${{ secrets.TRACKER_MCP_TOKEN }}
            TRACKER_MCP_TIMEOUT=60
            DEFAULT_TEAM_ID=00000000-0000-0000-0000-000000000001
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
            GRAFANA_USER=${{ secrets.GRAFANA_USER }}
            GRAFANA_PASSWORD=${{ secrets.GRAFANA_PASSWORD }}
            GRAFANA_URL=${{ secrets.GRAFANA_URL || format('https://{0}/grafana', secrets.TG_DOMAIN || vars.TG_DOMAIN) }}
            GRAFANA_SERVE_FROM_SUB_PATH=true
            ENVIRONMENT=test
            LOG_LEVEL=DEBUG
            TELEGRAM_BRIDGE_ENABLED=${{ secrets.TELEGRAM_BRIDGE_ENABLED }}
            TELEGRAM_BRIDGE_HMAC_KEYS=${{ secrets.TELEGRAM_BRIDGE_HMAC_KEYS }}
            TELEGRAM_BRIDGE_NONCE_TTL=300
            TELEGRAM_OUTBOX_LEASE_SECONDS=60
            S3_ENDPOINT=${{ secrets.S3_ENDPOINT || 'https://storage.yandexcloud.net' }}
            S3_BUCKET=${{ secrets.S3_BUCKET }}
            S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}
            S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}
            S3_REGION=${{ secrets.S3_REGION || 'ru-central1' }}
            SPEECHKIT_API_KEY=${{ secrets.SPEECHKIT_API_KEY }}
            EOF

            # A previously interrupted recreate can leave Docker-renamed
            # containers behind (e.g. "<hash>_test-pm-orchestrator-1"). They
            # still hold the original name, so the next `up` fails with a
            # "container name is already in use" conflict. Compose no longer
            # tracks them (the name no longer matches), so remove them first.
            dangling=$(docker ps -aq --filter "name=_test-")
            if [ -n "$dangling" ]; then
              echo "=== Removing leftover renamed containers from a previous deploy ==="
              docker rm -f $dangling
            fi

            docker compose \
              -f docker-compose.yml \
              -f docker-compose.test.yml \
              -f docker-compose.monitoring.yml \
              --env-file .env.test \
              up --build -d --remove-orphans

            echo "=== Running containers ==="
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.test.yml \
              -f docker-compose.monitoring.yml \
              --env-file .env.test \
              ps
