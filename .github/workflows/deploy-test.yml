name: Deploy → Test

on:
  push:
    branches: [develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: test
    needs: []  # запускается параллельно с CI; добавь "lint-and-test" чтобы деплоить только после зелёного CI

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/pm-agent/test

            git fetch origin develop
            git reset --hard origin/develop

            # Пишем .env из секретов GitHub — без ручного редактирования на сервере
            cat > .env.test << EOF
            DB_USER=pm_agent_test
            DB_NAME=pm_agent_test
            DB_PASSWORD=${{ secrets.TEST_DB_PASSWORD }}
            YC_API_KEY=${{ secrets.YC_API_KEY }}
            YC_FOLDER_ID=${{ secrets.YC_FOLDER_ID }}
            ENVIRONMENT=test
            LOG_LEVEL=DEBUG
            EOF

            docker compose -f docker-compose.yml -f docker-compose.test.yml \
              --env-file .env.test \
              up --build -d --remove-orphans

            echo "=== Running containers ==="
            docker compose -f docker-compose.yml -f docker-compose.test.yml ps
