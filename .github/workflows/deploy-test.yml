name: Deploy → Test

on:
  push:
    branches: [develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: test

    steps:
      - uses: actions/checkout@v4

      - name: Sync code to VPS
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.git' --exclude='.env*'
          path: ./
          remote_path: /opt/pm-agent/test/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Write .env and restart containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/pm-agent/test

            cat > .env.test << EOF
            DB_USER=pm_agent_test
            DB_NAME=pm_agent_test
            DB_PASSWORD=${{ secrets.TEST_DB_PASSWORD }}
            YC_API_KEY=${{ secrets.YC_API_KEY }}
            YC_FOLDER_ID=${{ secrets.YC_FOLDER_ID }}
            ENVIRONMENT=test
            LOG_LEVEL=DEBUG
            EOF

            docker compose -f docker-compose.yml -f docker-compose.test.yml \
              --env-file .env.test \
              up --build -d --remove-orphans

            echo "=== Running containers ==="
            docker compose -f docker-compose.yml -f docker-compose.test.yml ps
