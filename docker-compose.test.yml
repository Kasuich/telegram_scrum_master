services:
  postgres:
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

  platform-api:
    ports:
      - "8100:8000"
    environment:
      LOG_LEVEL: DEBUG

  pm-orchestrator:
    environment:
      LOG_LEVEL: DEBUG
      RUNTIME_SKIP_TOOL_CONFIRM: ${RUNTIME_SKIP_TOOL_CONFIRM:-true}

volumes:
  postgres_test_data:
