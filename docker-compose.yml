services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pm-orchestrator:
    build:
      context: .
      dockerfile: services/pm-orchestrator/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      YC_API_KEY: ${YC_API_KEY}
      YC_FOLDER_ID: ${YC_FOLDER_ID}
      TRACKER_TOKEN: ${TRACKER_TOKEN}
      TRACKER_ORG_ID: ${TRACKER_ORG_ID}
      TRACKER_ORG_TYPE: ${TRACKER_ORG_TYPE:-360}
      TRACKER_QUEUE: ${TRACKER_QUEUE:-TEST}
      DEFAULT_TEAM_ID: ${DEFAULT_TEAM_ID:-00000000-0000-0000-0000-000000000001}
      ENVIRONMENT: ${ENVIRONMENT}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      RUNTIME_SKIP_TOOL_CONFIRM: ${RUNTIME_SKIP_TOOL_CONFIRM:-false}
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy

  platform-api:
    build:
      context: .
      dockerfile: services/platform-api/Dockerfile
    restart: unless-stopped
    environment:
      CHAT_MAX_MESSAGE_LENGTH: ${CHAT_MAX_MESSAGE_LENGTH:-100000}
      ORCHESTRATOR_URL: http://pm-orchestrator:8001
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      YC_API_KEY: ${YC_API_KEY}
      YC_FOLDER_ID: ${YC_FOLDER_ID}
      TRACKER_TOKEN: ${TRACKER_TOKEN}
      TRACKER_ORG_ID: ${TRACKER_ORG_ID}
      TRACKER_ORG_TYPE: ${TRACKER_ORG_TYPE:-360}
      ENVIRONMENT: ${ENVIRONMENT}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TELEGRAM_BRIDGE_ENABLED: ${TELEGRAM_BRIDGE_ENABLED:-false}
      TELEGRAM_BRIDGE_HMAC_KEYS: ${TELEGRAM_BRIDGE_HMAC_KEYS:-}
      TELEGRAM_BRIDGE_NONCE_TTL: ${TELEGRAM_BRIDGE_NONCE_TTL:-300}
      TELEGRAM_OUTBOX_LEASE_SECONDS: ${TELEGRAM_OUTBOX_LEASE_SECONDS:-60}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    depends_on:
      pm-orchestrator:
        condition: service_healthy
      postgres:
        condition: service_healthy

  console-api:
    build:
      context: .
      dockerfile: services/console-api/Dockerfile
    restart: unless-stopped
    environment:
      PLATFORM_API_URL: http://platform-api:8000
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      YC_API_KEY: ${YC_API_KEY}
      YC_FOLDER_ID: ${YC_FOLDER_ID}
      TRACKER_TOKEN: ${TRACKER_TOKEN}
      TRACKER_ORG_ID: ${TRACKER_ORG_ID}
      TRACKER_ORG_TYPE: ${TRACKER_ORG_TYPE:-360}
      DEFAULT_TEAM_ID: ${DEFAULT_TEAM_ID:-00000000-0000-0000-0000-000000000001}
      ENVIRONMENT: ${ENVIRONMENT}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CONSOLE_ADMIN_EMAIL: ${CONSOLE_ADMIN_EMAIL:-admin@example.com}
      CONSOLE_ADMIN_PASSWORD: ${CONSOLE_ADMIN_PASSWORD:-admin}
      CONSOLE_CORS_ORIGINS: ${CONSOLE_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    depends_on:
      platform-api:
        condition: service_healthy
      postgres:
        condition: service_healthy

  web-ui:
    build:
      context: .
      dockerfile: apps/web-ui/Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      console-api:
        condition: service_healthy

volumes:
  postgres_data:
