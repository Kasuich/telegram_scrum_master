services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pm-orchestrator:
    build:
      context: .
      dockerfile: services/pm-orchestrator/Dockerfile
    restart: unless-stopped
    environment:
      YC_API_KEY: ${YC_API_KEY}
      YC_FOLDER_ID: ${YC_FOLDER_ID}
      TRACKER_TOKEN: ${TRACKER_TOKEN}
      TRACKER_ORG_ID: ${TRACKER_ORG_ID}
      TRACKER_ORG_TYPE: ${TRACKER_ORG_TYPE:-360}
      TRACKER_QUEUE: ${TRACKER_QUEUE:-TEST}
      ENVIRONMENT: ${ENVIRONMENT}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8001:8001"

  platform-api:
    build:
      context: .
      dockerfile: services/platform-api/Dockerfile
    restart: unless-stopped
    environment:
      ORCHESTRATOR_URL: http://pm-orchestrator:8001
      ENVIRONMENT: ${ENVIRONMENT}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      - pm-orchestrator

volumes:
  postgres_data:
