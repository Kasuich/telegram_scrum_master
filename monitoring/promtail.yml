server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - docker: {}
      - match:
          selector: '{job="docker"} !~ "agent_step"'
          action: drop
      - json:
          expressions:
            event: event
            agent_name: agent_name
            session_id: session_id
            stage: stage
            kind: kind
            tool_name: tool_name
            ts: ts
      - labels:
          agent_name:
          session_id:
          stage:
          kind:
          tool_name:
      - timestamp:
           source: ts
           format: ISO8601
