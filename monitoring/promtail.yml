server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - docker: {}
      - match:
          selector: '{job="docker"} !~ "agent_step"'
          action: drop
      # First json stage: parse the outer structlog JSON to get the "message" field
      - json:
          expressions:
            message: message
      # Second json stage: parse the inner JSON inside "message"
      - json:
          source: message
          expressions:
            event: event
            agent_name: agent_name
            session_id: session_id
            stage: stage
            kind: kind
            tool_name: tool_name
            state: state
            label: label
            ts: ts
            duration_s: duration_s
            offset_s: offset_s
            step_idx: step_idx
            end_ts: end_ts
            trace_label: trace_label
      - labels:
          agent_name:
          session_id:
          stage:
          kind:
          tool_name:
          state:
      - timestamp:
          source: ts
          format: ISO8601
