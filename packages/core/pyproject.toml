[project]
name = "core"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "sqlalchemy>=2.0",
    "asyncpg>=0.29",
    "httpx>=0.25",
    "alembic>=1.13",
    "prometheus-client>=0.20",
    "croniter>=2.0",
    "Pillow>=10.1",
]

[project.optional-dependencies]
test = [
    "pytest>=7.0",
    "pytest-asyncio>=0.23",
    "pytest-mock>=3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
# Exclude smoke tests (real API calls) by default; run them with `-m smoke`.
addopts = "-m 'not smoke'"
markers = ["smoke: real API calls — skipped by default, run with -m smoke"]
